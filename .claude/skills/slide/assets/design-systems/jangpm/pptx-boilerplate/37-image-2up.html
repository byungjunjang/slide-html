<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>P-37 Image 2up</title>
<link rel="stylesheet" href="../_pptx-slide.css">
</head>
<body>

<!-- header -->
<p class="t-cap-up" style="position: absolute; top: 42pt; left: 56pt;">SECTION 02 · 사례</p>
<p class="t-cap c-tertiary" style="position: absolute; top: 42pt; right: 56pt;">10 / 12</p>
<div class="rule" style="position: absolute; top: 64pt; left: 56pt; right: 56pt;"></div>

<!-- head: accent strip + title -->
<div style="position: absolute; top: 88pt; left: 56pt; display: flex; gap: 12pt; align-items: center;">
  <div class="strip-accent" style="height: 30pt;"></div>
  <h2 class="t-h2"><span class="c-accent">(2)</span> Before → After 스크린샷 비교</h2>
</div>

<!-- subtitle -->
<div style="position: absolute; top: 130pt; left: 56pt; display: flex; gap: 10pt; align-items: center;">

<!-- 2-up image pair -->
<div style="position: absolute; top: 168pt; left: 56pt; right: 56pt; display: grid; grid-template-columns: 1fr 30pt 1fr; gap: 16pt; align-items: stretch; height: 264pt;">

  <div>
    <p class="t-cap-up c-secondary" style="margin-bottom: 6pt;">BEFORE</p>
    <div class="ph-frame" style="height: 232pt; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6pt;">
      <div style="background: #E8E5FC; border-radius: 10pt; width: 48pt; height: 48pt; text-align: center;">
        <p class="t-h3 c-accent" style="line-height: 48pt;">▦</p>
      </div>
      <p class="t-cap" style="font-weight: 600;">스크린샷 1</p>
      <p class="t-cap c-secondary">600 × 480 권장</p>
    </div>
  </div>

  <div style="display: flex; align-items: center; justify-content: center;">
    <p class="c-accent" style="font-size: 28pt; font-weight: 300;">→</p>
  </div>

  <div>
    <p class="t-cap-up c-accent" style="margin-bottom: 6pt;">AFTER</p>
    <div class="ph-frame" style="height: 232pt; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6pt;">
      <div style="background: #E8E5FC; border-radius: 10pt; width: 48pt; height: 48pt; text-align: center;">
        <p class="t-h3 c-accent" style="line-height: 48pt;">▦</p>
      </div>
      <p class="t-cap" style="font-weight: 600;">스크린샷 2</p>
      <p class="t-cap c-secondary">600 × 480 권장</p>
    </div>
  </div>

</div>

<!-- gm band -->
<div class="gm-band">
  <p class="t-body c-secondary">이미지 자체가 메시지 — <b class="c-text">보여주고 말하세요</b>, 설명하지 말고.</p>
</div>
