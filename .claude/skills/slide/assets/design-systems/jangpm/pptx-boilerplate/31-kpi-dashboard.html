<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>P-31 KPI Dashboard</title>
<link rel="stylesheet" href="../_pptx-slide.css">
</head>
<body>

<!-- header -->
<p class="t-cap-up" style="position: absolute; top: 42pt; left: 56pt;">SECTION 06 · 성과 측정</p>
<p class="t-cap c-tertiary" style="position: absolute; top: 42pt; right: 56pt;">08 / 20</p>
<div class="rule" style="position: absolute; top: 64pt; left: 56pt; right: 56pt;"></div>

<!-- title -->
<h2 class="t-h2" style="position: absolute; top: 88pt; left: 56pt; width: 760pt;">
  성과 측정 <span class="c-accent">지표</span>.
</h2>

<!-- 5 KPI cards -->
<div style="position: absolute; top: 168pt; left: 56pt; right: 56pt; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12pt;">

  <div class="card" style="padding: 14pt 12pt;">
    <p class="t-cap-up">고객 만족도</p>
    <p class="t-display2 c-positive" style="margin-top: 8pt;">99.5<span style="font-size: 0.55em;">점</span></p>
    <div style="margin-top: 6pt; height: 6pt; background: #E5E7EB; border-radius: 3pt; overflow: hidden;">
      <div style="height: 100%; width: 99.5%; background: #059669;"></div>
    </div>
    <p class="t-cap c-secondary" style="margin-top: 6pt;">경고 기준 <b class="c-text">60점</b> 이하</p>
  </div>

  <div class="card-accent" style="padding: 14pt 12pt;">
    <p class="t-cap-up c-accent">매출 성장률</p>
    <p class="t-display2 c-accent" style="margin-top: 8pt;">+21<span style="font-size: 0.55em;">%</span></p>
    <div style="margin-top: 6pt; height: 6pt; background: rgba(70,51,227,0.15); border-radius: 3pt; overflow: hidden;">
      <div style="height: 100%; width: 100%; background: #4633E3;"></div>
    </div>
    <p class="t-cap c-accent-ink" style="margin-top: 6pt;">경고 기준 <b>+15%</b> 이하</p>
  </div>

  <div class="card" style="padding: 14pt 12pt;">
    <p class="t-cap-up">영업이익률</p>
    <p class="t-display2 c-positive" style="margin-top: 8pt;">12<span style="font-size: 0.55em;">%</span></p>
    <div style="margin-top: 6pt; height: 6pt; background: #E5E7EB; border-radius: 3pt; overflow: hidden;">
      <div style="height: 100%; width: 78%; background: #059669;"></div>
    </div>
    <p class="t-cap c-secondary" style="margin-top: 6pt;">경고 기준 <b class="c-text">9%</b> 이하</p>
  </div>

  <div class="card" style="padding: 14pt 12pt;">
    <p class="t-cap-up">재고 회전율</p>
    <p class="t-display2 c-warning" style="margin-top: 8pt;">5.5<span style="font-size: 0.55em;">회</span></p>
    <div style="margin-top: 6pt; height: 6pt; background: #E5E7EB; border-radius: 3pt; overflow: hidden;">
      <div style="height: 100%; width: 62%; background: #D97706;"></div>
    </div>
    <p class="t-cap c-secondary" style="margin-top: 6pt;">경고 기준 <b class="c-text">4.8회</b> 이하</p>
  </div>

  <div class="card" style="padding: 14pt 12pt;">
    <p class="t-cap-up">재구매율</p>
    <p class="t-display2 c-negative" style="margin-top: 8pt;">40<span style="font-size: 0.55em;">%</span></p>
    <div style="margin-top: 6pt; height: 6pt; background: #E5E7EB; border-radius: 3pt; overflow: hidden;">
      <div style="height: 100%; width: 40%; background: #E11D48;"></div>
    </div>
    <p class="t-cap c-negative" style="margin-top: 6pt;"><b>경고 구간</b> · 기준 35% 근접</p>
  </div>

</div>

<!-- insight bar -->
<div class="card-accent" style="position: absolute; top: 380pt; left: 56pt; right: 56pt; padding: 12pt 16pt;">
  <p class="t-body c-accent-ink"><b>재구매율이 가장 취약한 지표</b> — 목표 미달 시 즉각 원인 분석과 개선 조치를 마련해 실행해야 합니다.</p>
</div>

<!-- gm band -->
<div class="gm-band">
  <p class="t-body c-secondary">5개 지표 중 <b class="c-text">4개 안정 / 1개 주의</b> — 개선 포인트가 명확할 때 행동이 빠릅니다.</p>
</div>

</body>
</html>
