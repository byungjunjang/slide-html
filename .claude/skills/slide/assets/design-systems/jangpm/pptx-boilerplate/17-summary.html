<!DOCTYPE html>

<head>

<body>

<!-- header -->
<p class="t-cap-up" style="position: absolute; top: 42pt; left: 56pt;">WRAP-UP · 오늘의 정리</p>
<p class="t-cap c-tertiary" style="position: absolute; top: 42pt; right: 56pt;">11 / 12</p>
<div class="rule" style="position: absolute; top: 64pt; left: 56pt; right: 56pt;"></div>

<!-- title -->
<h2 class="t-h2" style="position: absolute; top: 88pt; left: 56pt; width: 760pt;">
  세 문장으로 남기는 <span class="c-accent">오늘의 결론</span>.
</h2>

<!-- 3 stacked rows -->
<div style="position: absolute; top: 158pt; left: 56pt; right: 56pt; display: flex; flex-direction: column; gap: 12pt;">

  <!-- row 1 -->
  <div class="card" style="display: grid; grid-template-columns: 36pt 1fr; gap: 16pt; align-items: center; padding: 16pt 20pt;">
    <div class="number-circle-lg">
      <p class="t-cap c-white" style="line-height: 28pt; font-weight: 800;">01</p>
    </div>
    <div>
      <p class="t-h3">AI의 성과는 도구가 아니라 <span class="c-accent">루프</span>에서 나옵니다.</p>
      <p class="t-cap c-secondary" style="margin-top: 4pt;">관찰 → 구조화 → 위임 — 세 개의 의식적 루프.</p>
    </div>
  </div>

  <!-- row 2 -->
  <div class="card" style="display: grid; grid-template-columns: 36pt 1fr; gap: 16pt; align-items: center; padding: 16pt 20pt;">
    <div class="number-circle-lg">
      <p class="t-cap c-white" style="line-height: 28pt; font-weight: 800;">02</p>
    </div>
    <div>
      <p class="t-h3">좋은 프롬프트는 <span class="c-accent">팀 자산</span>입니다.</p>
      <p class="t-cap c-secondary" style="margin-top: 4pt;">개인의 기술이 아니라 문서화 가능한 프로세스로 만들기.</p>
    </div>
  </div>

  <!-- row 3 (accent) -->
  <div class="card-accent" style="display: grid; grid-template-columns: 36pt 1fr; gap: 16pt; align-items: center; padding: 16pt 20pt;">
    <div class="number-circle-lg">
      <p class="t-cap c-white" style="line-height: 28pt; font-weight: 800;">03</p>
    </div>
    <div>
      <p class="t-h3 c-accent-ink">가장 큰 투자는 <b class="c-accent">메타 인식</b>입니다.</p>
      <p class="t-cap c-accent-ink" style="margin-top: 4pt;">도구를 쓰는 나를 관찰하는 습관 — 이게 복리로 작동합니다.</p>
    </div>
  </div>

</div>

<!-- gm band -->
<div class="gm-band">
  <p class="t-body c-secondary">"Prompt를 잘 쓰는 법"이 아닌, <b class="c-text">Prompt를 쓰는 나</b>를 설계하는 법.</p>
</div>
