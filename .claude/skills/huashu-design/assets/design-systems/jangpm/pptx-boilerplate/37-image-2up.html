<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Image Showcase 2up — Jangpm</title>
<link rel="stylesheet" href="../design-system/slides/_slide.css">
<link rel="stylesheet" href="../_pptx-slide.css">
<style>
  /* Override _slide.css 100vh body: html2pptx needs body == canvas (1280x720px = 960x540pt) */
  html, body { width: 1280px; height: 720px; padding: 0; margin: 0; min-height: 0; overflow: hidden; display: block; background: #FAFAF9; }
</style>
<style>
  .im-head { display: flex; align-items: center; gap: var(--space-4); }
  .im-index {
    display: inline-flex; width: 8px; align-self: stretch;
    background: var(--accent); border-radius: 3px;
  }
  .im-title {
    font-size: 2rem; font-weight: 800; color: var(--text);
    letter-spacing: -0.02em; line-height: 1.2;
  }
  .im-title .num { color: var(--accent); }
  .im-subtitle {
    display: flex; align-items: center; gap: var(--space-3);
    font-size: 1.05rem; font-weight: 600; color: var(--text);
    margin-top: var(--space-2);
  }
  .im-subtitle::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }

  .im-pair {
    flex: 1; display: grid; grid-template-columns: 1fr auto 1fr;
    gap: var(--space-5); align-items: stretch;
    margin-top: var(--space-4);
  }
  .im-slot { display: flex; flex-direction: column; gap: var(--space-2); }
  .im-slot-label {
    font-size: var(--fs-caption); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-secondary);
  }
  .im-slot-label.after { color: var(--accent); }
  /* Phase 3 (2026-04-27): Dropped linear-gradient + repeating-linear-gradient
     graph-paper texture per E3/E4 constraint. Solid bg + dashed border still
     visually communicates "image goes here". */
  .im-placeholder {
    flex: 1;
    background: var(--surface-alt);
    border: 2px dashed var(--border);
    border-radius: var(--card-radius);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-secondary);
    gap: var(--space-2);
    min-height: 0;
  }
  .im-ph-icon {
    width: 48px; height: 48px; border-radius: 10px;
    background: var(--accent-soft); color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 700;
  }
  .im-ph-caption { font-size: 0.9rem; font-weight: 600; }
  .im-ph-note { font-size: var(--fs-caption); color: var(--text-secondary); }

  .im-arrow {
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; color: var(--accent); font-weight: 300;
  }
</style>
</head>
<body>
<section class="slide">
  <div class="flex-row justify-between items-center">
    <span class="label-caption">Section 02 · 사례</span>
    <span class="caption">10 / 12</span>
  </div>

  <div class="im-head">
    <div class="im-index"></div>
    <h3 class="im-title"><span class="num">(2)</span> Before → After 스크린샷 비교</h3>
  </div>
  <p class="im-subtitle">같은 과제, 프롬프트만 바꿨을 때의 결과 차이</p>

  <div class="im-pair">
    <div class="im-slot">
      <span class="im-slot-label">Before</span>
      <div class="im-placeholder">
        <span class="im-ph-icon">▦</span>
        <p class="im-ph-caption">스크린샷 1</p>
        <p class="im-ph-note">600 × 480 권장</p>
      </div>
    </div>

    <p class="im-arrow">→</p>

    <div class="im-slot">
      <span class="im-slot-label after">After</span>
      <div class="im-placeholder">
        <span class="im-ph-icon">▦</span>
        <p class="im-ph-caption">스크린샷 2</p>
        <p class="im-ph-note">600 × 480 권장</p>
      </div>
    </div>
  </div>

  <p class="gm">이미지 자체가 메시지 — <b>보여주고 말하세요</b>, 설명하지 말고.</p>
</section>
</body>
</html>
