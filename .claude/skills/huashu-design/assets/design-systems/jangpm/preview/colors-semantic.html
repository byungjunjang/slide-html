<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="col" style="gap: 12px;">
  <div style="font-size: 13px; color: var(--text-secondary);">Data-context only. Never decorative.</div>
  <div class="row" style="gap: 10px;">
    <div class="col"><div class="swatch" style="width:100px;height:56px;background:#059669;"></div><div class="mono">--positive · #059669</div></div>
    <div class="col"><div class="swatch" style="width:100px;height:56px;background:#ECFDF5;"></div><div class="mono">--positive-soft</div></div>
    <div class="col"><div class="swatch" style="width:100px;height:56px;background:#E11D48;"></div><div class="mono">--negative · #E11D48</div></div>
    <div class="col"><div class="swatch" style="width:100px;height:56px;background:#FFF1F2;"></div><div class="mono">--negative-soft</div></div>
    <div class="col"><div class="swatch" style="width:100px;height:56px;background:#D97706;"></div><div class="mono">--warning · #D97706</div></div>
    <div class="col"><div class="swatch" style="width:100px;height:56px;background:#FFFBEB;"></div><div class="mono">--warning-soft</div></div>
  </div>
  <div class="row" style="gap: 14px; margin-top: 4px;">
    <span style="color:#059669;font-weight:600;font-size:13px;">↑ +21% 성장률</span>
    <span style="color:#E11D48;font-weight:600;font-size:13px;">↓ -2% 재구매율</span>
    <span style="color:#D97706;font-weight:600;font-size:13px;">⚠ 경고 기준 60점</span>
  </div>
</div>
</body></html>
