<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="col" style="gap: 14px;">
  <div class="row" style="gap: 10px; flex-wrap: wrap;">
    <span style="display:inline-flex;padding:8px 16px;background:#E8E5FC;color:#4633E3;border-radius:9999px;font-size:15px;font-weight:600;">Topic Label</span>
    <span style="display:inline-flex;padding:4px 12px;background:#E8E5FC;color:#4633E3;border-radius:9999px;font-size:12.8px;font-weight:600;">accent-sm</span>
    <span style="display:inline-flex;padding:4px 16px;background:#4633E3;color:#fff;border-radius:9999px;font-size:12.8px;font-weight:600;">pill</span>
    <span style="display:inline-flex;padding:4px 16px;background:#1A1A1A;color:#FAFAF9;border-radius:9999px;font-size:12.8px;font-weight:600;">pill-dark</span>
    <span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:#4633E3;color:#fff;border-radius:50%;font-size:12.8px;font-weight:800;">01</span>
    <span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:#E5E7EB;color:#6B7280;border-radius:50%;font-size:12.8px;font-weight:800;">02</span>
  </div>
  <div class="row" style="gap: 8px;">
    <span style="display:inline-flex;align-items:center;font-size:12.8px;line-height:1;">
      <span style="padding:4px 8px;background:#4633E3;color:#fff;border-radius:4px 0 0 4px;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;">CLI</span>
      <span style="padding:4px 8px;background:#fff;border:1px solid #E5E7EB;border-left:none;border-radius:0 4px 4px 0;font-family:var(--font-mono);">/plugin install</span>
    </span>
    <span style="padding:4px 10px;background:#ECFDF5;color:#059669;border-radius:6px;font-size:12.8px;font-weight:600;">✓ Ready</span>
    <span style="padding:4px 10px;background:#FFF1F2;color:#E11D48;border-radius:6px;font-size:12.8px;font-weight:600;">⚠ Risk</span>
  </div>
</div>
</body></html>
