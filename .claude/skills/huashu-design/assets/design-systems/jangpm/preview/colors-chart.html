<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="col" style="gap: 10px;">
  <div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 4px;">Single-accent opacity ladder — charts use only these four stops.</div>
  <div class="row" style="gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border);">
    <div style="flex:1;height:80px;background:rgba(70,51,227,0.85);display:flex;align-items:flex-end;padding:6px 8px;"><span style="color:#fff;font-family:var(--font-mono);font-size:11px;">0.85</span></div>
    <div style="flex:1;height:80px;background:rgba(70,51,227,0.6);display:flex;align-items:flex-end;padding:6px 8px;"><span style="color:#fff;font-family:var(--font-mono);font-size:11px;">0.60</span></div>
    <div style="flex:1;height:80px;background:rgba(70,51,227,0.4);display:flex;align-items:flex-end;padding:6px 8px;"><span style="color:#1A1A1A;font-family:var(--font-mono);font-size:11px;">0.40</span></div>
    <div style="flex:1;height:80px;background:rgba(70,51,227,0.25);display:flex;align-items:flex-end;padding:6px 8px;"><span style="color:#1A1A1A;font-family:var(--font-mono);font-size:11px;">0.25</span></div>
  </div>
  <div class="mono">rgba(70, 51, 227, X) — CSS variables can't resolve in Chart.js</div>
</div>
</body></html>
