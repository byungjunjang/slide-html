<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Cover Vertical — Jangpm</title>
<link rel="stylesheet" href="_slide.css">
</head>
<body>
<section class="slide" style="padding: var(--space-16) var(--space-14); justify-content: space-between;">
  <div class="flex-row justify-between items-center">
    <span class="label-caption">사업계획서 · Business Plan</span>
    <span class="caption">01 / 20</span>
  </div>

  <div style="display:grid; grid-template-columns: 1.3fr 1fr; gap: var(--space-12); align-items: center; flex: 1;">
    <div class="flex-col" style="gap: var(--space-3);">
      <span class="accent-badge" style="margin-bottom: var(--space-4);">상반기 · H1</span>
      <div style="font-size: 6.5rem; font-weight: 800; line-height: 0.98; letter-spacing: -0.04em; color: var(--text);">
        사업<br>계획서
      </div>
      <div style="font-size: 5rem; font-weight: 200; line-height: 1; letter-spacing: -0.03em; color: var(--accent); margin-top: var(--space-2);">
        2030
      </div>
      <hr class="rule-accent" style="width: 80px; margin-top: var(--space-6);">
      <p class="body" style="color: var(--text-secondary); max-width: 420px;">
        라이프스타일 & 데일리 굿즈 소매 · 안정적 매출 유지, 수익성 개선 및 확장 단계.
      </p>
    </div>
    <div style="position: relative;">
      <div style="position: absolute; top: 20px; right: 20px; width: 280px; height: 280px; background: var(--accent-soft); border-radius: 50%;"></div>
      <div style="position: absolute; bottom: 40px; left: 20px; width: 80px; height: 80px; background: var(--text); border-radius: 50%;"></div>
      <img src="../assets/jangpm-character.png" alt="" style="position: relative; width: 100%; max-width: 420px; height: 420px; object-fit: contain;">
    </div>
  </div>

  <div class="flex-row justify-between items-end">
    <div class="flex-col gap-1">
      <span class="label-caption">Prepared by</span>
      <span class="title">장피엠 전략팀 · 2026.04</span>
    </div>
    <span class="caption" style="font-family: var(--font-mono);">JANGPM / H1-2030</span>
  </div>
</section>
</body>
</html>
