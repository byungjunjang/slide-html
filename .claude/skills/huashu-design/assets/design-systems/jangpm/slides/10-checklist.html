<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Checklist Slide — Jangpm</title>
<link rel="stylesheet" href="_slide.css">
</head>
<body>
<section class="slide">
  <div class="flex-row justify-between items-center">
    <span class="label-caption">Section 03 · 체크리스트</span>
    <span class="caption">10 / 12</span>
  </div>
  <h2 class="headline" style="font-size: 2.3rem;">프롬프트 전에 <span style="color: var(--accent);">스스로에게</span> 묻기.</h2>
  <p class="body" style="color: var(--text-secondary); max-width: 820px;">
    이 6개에 '예'라고 답할 수 없다면, 아직 프롬프트를 쓸 준비가 안 된 상태입니다.
  </p>

  <div class="grid-2" style="flex: 1; margin-top: var(--space-4); gap: var(--space-4);">
    <div class="flex-col gap-3">
      <label class="flex-row gap-3 items-start" style="padding: var(--space-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius);">
        <span style="display:inline-flex; align-items:center; justify-content:center; width: 22px; height: 22px; background: var(--accent); color: #fff; border-radius: 4px; font-size: 12px; font-weight: 800; flex-shrink:0; margin-top: 2px;">✓</span>
        <div><div class="title">내가 원하는 <b>결과물의 형식</b>을 한 문장으로 말할 수 있다.</div><div class="caption" style="margin-top: 4px;">예: "4줄 요약 + 근거 링크 3개"</div></div>
      </label>
      <label class="flex-row gap-3 items-start" style="padding: var(--space-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius);">
        <span style="display:inline-flex; align-items:center; justify-content:center; width: 22px; height: 22px; background: var(--accent); color: #fff; border-radius: 4px; font-size: 12px; font-weight: 800; flex-shrink:0; margin-top: 2px;">✓</span>
        <div><div class="title">이 작업의 <b>성공 기준</b>을 사전에 정의했다.</div><div class="caption" style="margin-top: 4px;">누가 보고 "됐다"고 판단할 것인가?</div></div>
      </label>
      <label class="flex-row gap-3 items-start" style="padding: var(--space-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius);">
        <span style="display:inline-flex; align-items:center; justify-content:center; width: 22px; height: 22px; background: var(--accent); color: #fff; border-radius: 4px; font-size: 12px; font-weight: 800; flex-shrink:0; margin-top: 2px;">✓</span>
        <div><div class="title">참조할 <b>좋은 사례</b>를 최소 1개 갖고 있다.</div><div class="caption" style="margin-top: 4px;">과거 보고서, 블로그 포스트 등 무엇이든.</div></div>
      </label>
    </div>
    <div class="flex-col gap-3">
      <label class="flex-row gap-3 items-start" style="padding: var(--space-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius);">
        <span style="display:inline-flex; align-items:center; justify-content:center; width: 22px; height: 22px; background: var(--accent); color: #fff; border-radius: 4px; font-size: 12px; font-weight: 800; flex-shrink:0; margin-top: 2px;">✓</span>
        <div><div class="title">AI 답을 <b>내가 검증</b>할 방법을 알고 있다.</div><div class="caption" style="margin-top: 4px;">검증 불가능한 영역이면 프롬프트를 쪼갠다.</div></div>
      </label>
      <label class="flex-row gap-3 items-start" style="padding: var(--space-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius);">
        <span style="display:inline-flex; align-items:center; justify-content:center; width: 22px; height: 22px; background: var(--accent); color: #fff; border-radius: 4px; font-size: 12px; font-weight: 800; flex-shrink:0; margin-top: 2px;">✓</span>
        <div><div class="title">실패 시 다시 시도할 <b>2안</b>이 있다.</div><div class="caption" style="margin-top: 4px;">"안 되면 이렇게 바꿔 묻는다"까지 정해둔다.</div></div>
      </label>
      <label class="flex-row gap-3 items-start" style="padding: var(--space-4); background: var(--accent-soft); border: 1px solid var(--accent); border-radius: var(--card-radius);">
        <span style="display:inline-flex; align-items:center; justify-content:center; width: 22px; height: 22px; background: var(--accent); color: #fff; border-radius: 4px; font-size: 12px; font-weight: 800; flex-shrink:0; margin-top: 2px;">✓</span>
        <div><div class="title" style="color: var(--accent-ink);">이 프롬프트를 <b>팀에 공유</b>할 가치가 있다.</div><div class="caption" style="color: var(--accent-ink); margin-top: 4px;">가장 중요한 마지막 질문 — "남길 만한가?"</div></div>
      </label>
    </div>
  </div>

  <div class="gm">체크리스트는 속도를 줄이지 않습니다 — <b>재작업</b>을 줄입니다.</div>
</section>
</body>
</html>
