<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Image Showcase 2up — Jangpm</title>
<link rel="stylesheet" href="_slide.css">
<style>
  .im-head { display: flex; align-items: center; gap: var(--space-4); }
  .im-index {
    display: inline-flex; width: 8px; align-self: stretch;
    background: var(--accent); border-radius: 3px;
  }
  .im-title {
    font-size: 2rem; font-weight: 800; color: var(--text);
    letter-spacing: -0.02em; line-height: 1.2;
  }
  .im-title .num { color: var(--accent); margin-right: var(--space-2); }
  .im-subtitle {
    display: flex; align-items: center; gap: var(--space-3);
    font-size: 1.05rem; font-weight: 600; color: var(--text);
    margin-top: var(--space-2);
  }
  .im-subtitle::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }

  .im-pair {
    flex: 1; display: grid; grid-template-columns: 1fr auto 1fr;
    gap: var(--space-5); align-items: stretch;
    margin-top: var(--space-4);
  }
  .im-slot { display: flex; flex-direction: column; gap: var(--space-2); }
  .im-slot-label {
    font-size: var(--fs-caption); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-secondary);
  }
  .im-slot-label.after { color: var(--accent); }
  .im-placeholder {
    flex: 1;
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface-alt) 100%);
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--card-radius);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-secondary);
    gap: var(--space-2);
    position: relative; overflow: hidden;
    min-height: 0;
  }
  .im-placeholder::before {
    content: ''; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(45deg, transparent 0 24px, rgba(0,0,0,0.015) 24px 48px);
    pointer-events: none;
  }
  .im-ph-icon {
    width: 48px; height: 48px; border-radius: 10px;
    background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 700;
  }
  .im-ph-caption { font-size: 0.9rem; font-weight: 600; }
  .im-ph-note { font-size: var(--fs-caption); color: var(--text-secondary); }

  .im-arrow {
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; color: var(--accent); font-weight: 300;
  }
</style>
</head>
<body>
<section class="slide">
  <div class="flex-row justify-between items-center">
    <span class="label-caption">Section 02 · 사례</span>
    <span class="caption">10 / 12</span>
  </div>

  <div class="im-head">
    <div class="im-index"></div>
    <div class="im-title"><span class="num">(2)</span>Before → After 스크린샷 비교</div>
  </div>
  <div class="im-subtitle">같은 과제, 프롬프트만 바꿨을 때의 결과 차이</div>

  <div class="im-pair">
    <div class="im-slot">
      <span class="im-slot-label">Before</span>
      <div class="im-placeholder">
        <div class="im-ph-icon">▦</div>
        <div class="im-ph-caption">스크린샷 1</div>
        <div class="im-ph-note">600 × 480 권장</div>
      </div>
    </div>

    <div class="im-arrow">→</div>

    <div class="im-slot">
      <span class="im-slot-label after">After</span>
      <div class="im-placeholder">
        <div class="im-ph-icon">▦</div>
        <div class="im-ph-caption">스크린샷 2</div>
        <div class="im-ph-note">600 × 480 권장</div>
      </div>
    </div>
  </div>

  <div class="gm">이미지 자체가 메시지 — <b>보여주고 말하세요</b>, 설명하지 말고.</div>
</section>
</body>
</html>
