<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Image Showcase 1up — Jangpm</title>
<link rel="stylesheet" href="_slide.css">
<style>
  /* Head pattern matches exercise slide */
  .im-head { display: flex; align-items: center; gap: var(--space-4); }
  .im-index {
    display: inline-flex; align-items: center; justify-content: center;
    width: 8px; align-self: stretch; background: var(--accent); border-radius: 3px;
  }
  .im-title {
    font-size: 2rem; font-weight: 800; color: var(--text);
    letter-spacing: -0.02em; line-height: 1.2;
  }
  .im-title .num { color: var(--accent); margin-right: var(--space-2); }

  .im-subtitle {
    display: flex; align-items: center; gap: var(--space-3);
    font-size: 1.05rem; font-weight: 600; color: var(--text);
    margin-top: var(--space-2);
  }
  .im-subtitle::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }

  /* Image frame */
  .im-frame {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    margin-top: var(--space-4);
  }
  .im-placeholder {
    width: 100%; height: 100%;
    background:
      linear-gradient(135deg, var(--surface) 0%, var(--surface-alt) 100%);
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--card-radius);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-secondary);
    gap: var(--space-3);
    position: relative;
    overflow: hidden;
  }
  .im-placeholder::before {
    content: ''; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(45deg, transparent 0 24px, rgba(0,0,0,0.015) 24px 48px);
    pointer-events: none;
  }
  .im-ph-icon {
    width: 56px; height: 56px; border-radius: 12px;
    background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; font-weight: 700;
  }
  .im-ph-caption { font-size: 0.95rem; font-weight: 600; }
  .im-ph-note { font-size: var(--fs-caption); color: var(--text-secondary); }
</style>
</head>
<body>
<section class="slide">
  <div class="flex-row justify-between items-center">
    <span class="label-caption">Section 02 · 사례</span>
    <span class="caption">09 / 12</span>
  </div>

  <div class="im-head">
    <div class="im-index"></div>
    <div class="im-title"><span class="num">(1)</span>메타 프롬프트 : 역으로 질문하게 하기</div>
  </div>
  <div class="im-subtitle">인터뷰 방식으로 구체적인 맥락을 제공하기</div>

  <div class="im-frame">
    <div class="im-placeholder">
      <div class="im-ph-icon">▦</div>
      <div class="im-ph-caption">스크린샷 / 예시 이미지 영역</div>
      <div class="im-ph-note">1280 × 480 권장 — 실제 이미지를 삽입해 주세요.</div>
    </div>
  </div>

  <div class="gm">"처음부터 생각을 정리하려 하지 말고, <b>핵심 질문에 잘 대답</b>부터 하자."</div>
</section>
</body>
</html>
