<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>P&L Statement — Jangpm</title>
<link rel="stylesheet" href="_slide.css">
</head>
<body>
<section class="slide">
  <div class="flex-row justify-between items-center">
    <span class="label-caption">Section 03 · 수익성 및 비용구조</span>
    <span class="caption">05 / 20</span>
  </div>
  <h2 class="headline" style="font-size: 2.3rem;"><span style="color: var(--accent);">2029년</span> 손익 요약.</h2>

  <!-- content group: vertically centered between title and GM -->
  <div style="flex: 1; display: flex; align-items: center;">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6); width: 100%; align-items: start;">
    <!-- P&L -->
    <div class="flex-col gap-3">
      <span class="label-caption">P&L Summary</span>
      <div class="card" style="padding: 0; gap: 0; overflow: hidden;">
        <div style="display:grid; grid-template-columns: 1.4fr 1fr 0.8fr; background: var(--text); color: var(--bg); padding: 8px var(--space-4); font-size: var(--fs-caption); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">
          <span>항목</span><span style="text-align:right;">금액</span><span style="text-align:right;">매출 대비</span>
        </div>
        <div style="display:grid; grid-template-columns: 1.4fr 1fr 0.8fr; padding: 8px var(--space-4); font-size: var(--fs-body); align-items:center; border-bottom: 1px solid var(--border);">
          <span style="font-weight: 600;">매출</span><span style="text-align:right; font-weight: 700;">58억 원</span>
          <span style="text-align:right; color: var(--text-secondary);">100%</span>
        </div>
        <div style="display:grid; grid-template-columns: 1.4fr 1fr 0.8fr; padding: 8px var(--space-4); font-size: var(--fs-body); align-items:center; border-bottom: 1px solid var(--border); background: var(--surface-alt);">
          <span style="color: var(--text-secondary); padding-left: var(--space-4);">− 매출 원가</span><span style="text-align:right;">33.6억</span>
          <span style="text-align:right; color: var(--text-secondary);">
            <span style="display:inline-block; background: var(--border); height: 6px; width: 58%; border-radius: 2px; vertical-align: middle; margin-right: 6px;"></span>58%
          </span>
        </div>
        <div style="display:grid; grid-template-columns: 1.4fr 1fr 0.8fr; padding: 8px var(--space-4); font-size: var(--fs-body); align-items:center; border-bottom: 1px solid var(--border);">
          <span style="font-weight: 600;">매출 총이익</span><span style="text-align:right; font-weight: 700;">24.4억</span>
          <span style="text-align:right; color: var(--positive); font-weight: 600;">42%</span>
        </div>
        <div style="display:grid; grid-template-columns: 1.4fr 1fr 0.8fr; padding: 8px var(--space-4); font-size: var(--fs-body); align-items:center; border-bottom: 1px solid var(--border); background: var(--surface-alt);">
          <span style="color: var(--text-secondary); padding-left: var(--space-4);">− 판매관리비</span><span style="text-align:right;">17.4억</span>
          <span style="text-align:right; color: var(--text-secondary);">
            <span style="display:inline-block; background: var(--border); height: 6px; width: 30%; border-radius: 2px; vertical-align: middle; margin-right: 6px;"></span>30%
          </span>
        </div>
        <div style="display:grid; grid-template-columns: 1.4fr 1fr 0.8fr; padding: 10px var(--space-4); font-size: var(--fs-body); align-items:center; background: var(--accent-soft);">
          <span style="font-weight: 700; color: var(--accent-ink);">영업 이익</span>
          <span style="text-align:right; font-weight: 800; color: var(--accent-ink); font-size: 1.2rem;">7.0억</span>
          <span style="text-align:right; color: var(--accent-ink); font-weight: 700;">12%</span>
        </div>
      </div>
    </div>

    <!-- Strategy -->
    <div class="flex-col gap-3">
      <span class="label-caption">비용 구조 상세 · 전년도 → 금년도 전략</span>
      <div class="flex-col" style="padding: var(--space-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius);">
        <div style="display:grid; grid-template-columns: 120px 100px 1fr; gap: var(--space-3); align-items:center; padding: 8px 0; border-bottom: 1px solid var(--border);">
          <span style="font-weight: 600;">인건비</span>
          <span class="caption">높음</span>
          <span class="body">매출 대비 비중 유지</span>
        </div>
        <div style="display:grid; grid-template-columns: 120px 100px 1fr; gap: var(--space-3); align-items:center; padding: 8px 0; border-bottom: 1px solid var(--border);">
          <span style="font-weight: 600;">마케팅비</span>
          <span class="caption">비효율</span>
          <span class="body"><b style="color: var(--accent);">ROI 중심</b> 재편</span>
        </div>
        <div style="display:grid; grid-template-columns: 120px 100px 1fr; gap: var(--space-3); align-items:center; padding: 8px 0; border-bottom: 1px solid var(--border);">
          <span style="font-weight: 600;">물류/포장</span>
          <span class="caption trend-warning">상승</span>
          <span class="body">발주 정확도 개선으로 상쇄</span>
        </div>
        <div style="display:grid; grid-template-columns: 120px 100px 1fr; gap: var(--space-3); align-items:center; padding: 8px 0;">
          <span style="font-weight: 600;">운영비</span>
          <span class="caption">고정적</span>
          <span class="body"><b style="color: var(--accent);">자동화</b>로 통제</span>
        </div>
      </div>
    </div>
  </div>
  </div>

  <div class="gm">원가율 <b>58%</b> 하에서 영업이익률 <b>12%</b> 확보 — 판관비 효율화가 다음 레버리지.</div>
</section>
</body>
</html>
