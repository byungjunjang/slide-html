<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Exercise Slide — Jangpm</title>
<link rel="stylesheet" href="_slide.css">
<style>
  /* Head pattern — purple pill + big black subject */
  .ex-head { display: flex; align-items: center; gap: var(--space-5); }
  .ex-category {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 14px 28px;
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius-sm);
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .ex-subject {
    font-size: 2.1rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  /* Side-bar label */
  .ex-label {
    position: relative;
    padding-left: var(--space-4);
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: var(--space-3);
  }
  .ex-label::before {
    content: '';
    position: absolute;
    left: 0; top: 2px; bottom: 2px;
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
  }
  .ex-problem {
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.45;
    letter-spacing: -0.01em;
  }
  .ex-problem b { color: var(--accent); font-weight: 700; }

  /* Before / After pair — screenshot slots */
  .ex-pair {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: var(--space-5);
    align-items: stretch;
    flex: 1;
    min-height: 0;
  }
  .ex-slot { display: flex; flex-direction: column; gap: var(--space-2); min-height: 0; }
  .ex-slot-label {
    display: inline-flex; align-items: center;
    font-size: var(--fs-caption); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-secondary);
    width: fit-content;
  }
  .ex-slot-label.after { color: var(--accent); }

  .ex-placeholder {
    flex: 1;
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface-alt) 100%);
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--card-radius);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: var(--space-2);
    color: var(--text-secondary);
    position: relative; overflow: hidden;
    min-height: 0;
  }
  .ex-placeholder.accent {
    background: linear-gradient(135deg, var(--accent-soft) 0%, var(--surface) 100%);
    border-color: var(--accent);
  }
  .ex-placeholder::before {
    content: ''; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(45deg, transparent 0 24px, rgba(0,0,0,0.015) 24px 48px);
    pointer-events: none;
  }
  .ex-ph-icon {
    width: 48px; height: 48px; border-radius: 10px;
    background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 700;
  }
  .ex-ph-caption { font-size: 0.9rem; font-weight: 600; }
  .ex-ph-note { font-size: var(--fs-caption); color: var(--text-secondary); }

  .ex-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    color: var(--accent);
    font-weight: 300;
  }
</style>
</head>
<body>
<section class="slide">
  <div class="flex-row justify-between items-center">
    <span class="label-caption">Section 03 · 실습</span>
    <span class="caption">08 / 12</span>
  </div>

  <!-- Head: pill + subject -->
  <div class="ex-head">
    <span class="ex-category">에이전트 실습</span>
    <span class="ex-subject">민감 정보 탐지 및 마스킹</span>
  </div>

  <!-- content group: vertically centered between head and GM -->
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; gap: var(--space-5); min-height: 0;">
    <!-- Problem statement -->
    <div>
      <div class="ex-label">해결하고자 하는 문제</div>
      <p class="ex-problem">내부 문서에 있는 고객의 <b>개인 정보</b>를 알아서 탐지해서, <b>알아서 마스킹</b> 처리해줬으면 좋겠다.</p>
    </div>

    <!-- Before / After screenshot slots -->
    <div class="ex-pair">
      <div class="ex-slot">
        <span class="ex-slot-label">Before</span>
        <div class="ex-placeholder">
          <div class="ex-ph-icon">▦</div>
          <div class="ex-ph-caption">원본 문서 스크린샷</div>
          <div class="ex-ph-note">이 위치에 스크린샷을 삽입하세요.</div>
        </div>
      </div>

      <div class="ex-arrow">→</div>

      <div class="ex-slot">
        <span class="ex-slot-label after">After · Masked</span>
        <div class="ex-placeholder accent">
          <div class="ex-ph-icon">▦</div>
          <div class="ex-ph-caption">마스킹된 결과 스크린샷</div>
          <div class="ex-ph-note">이 위치에 스크린샷을 삽입하세요.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="gm">에이전트는 <b>문서의 의미 단위</b>를 먼저 파악한 뒤, <b>민감 필드만 선택적으로</b> 가립니다.</div>
</section>
</body>
</html>
