<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Title Slide — Jangpm</title>
<link rel="stylesheet" href="../design-system/slides/_slide.css">
<link rel="stylesheet" href="../_pptx-slide.css">
<style>
  /* Override _slide.css 100vh body: html2pptx needs body == canvas (1280x720px = 960x540pt) */
  html, body { width: 1280px; height: 720px; padding: 0; margin: 0; min-height: 0; overflow: hidden; display: block; background: {{TOKEN:colors.bg}}; }
</style>
</head>
<body>
<section class="slide slide-centered" style="padding: var(--space-16);">
  <div style="display:flex; align-items:center; gap: var(--space-12); width:100%;">
    <div class="flex-col gap-6" style="flex: 1;">
      <span class="accent-badge">강의 슬라이드 · Lecture Series</span>
      <h1 class="display" style="font-size: 4rem; line-height: 1.05;">
        AI 성과를 극대화하는<br>
        <span style="color: var(--accent);">메타적인</span> 접근법
      </h1>
      <p class="body" style="font-size: 1.1rem; color: var(--text-secondary); max-width: 560px;">
        도구를 더 잘 쓰는 법이 아니라, 도구를 쓰는 <b style="color: var(--text);">나의 사고방식</b>을 설계하는 법.
      </p>
      <hr class="rule-accent" style="width: 80px; margin-top: var(--space-4);">
      <div class="flex-col gap-2">
        <span class="label-caption">발표자 · Speaker</span>
        <div class="flex-row gap-3 items-center">
          <span class="title">장피엠 (Jang PM)</span>
          <span class="caption">· 2026.04.20</span>
        </div>
      </div>
    </div>
    {{IF:assets.character}}<img src="../design-system/assets/jangpm-character.png" alt="Jangpm" style="width: 380px; height: 380px; object-fit: contain; flex-shrink: 0;">{{/IF}}
  </div>
  <div style="position:absolute; bottom: var(--space-8); left: var(--space-14); right: var(--space-14); display:flex; justify-content: space-between; align-items: center;">
    <span class="caption" style="font-family: var(--font-mono);">JANGPM × AI · EP.01</span>
    <span class="caption">01 / 12</span>
  </div>
</section>
</body>
</html>
