<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Summary Slide — Jangpm</title>
<link rel="stylesheet" href="../design-system/slides/_slide.css">
<link rel="stylesheet" href="../_pptx-slide.css">
<style>
  /* Override _slide.css 100vh body: html2pptx needs body == canvas (1280x720px = 960x540pt) */
  html, body { width: 1280px; height: 720px; padding: 0; margin: 0; min-height: 0; overflow: hidden; display: block; background: {{TOKEN:colors.bg}}; }
</style>
</head>
<body>
<section class="slide">
  <div class="flex-row justify-between items-center">
    <span class="label-caption">Wrap-up · 오늘의 정리</span>
    <span class="caption">11 / 12</span>
  </div>
  <h2 class="headline" style="font-size: 2.3rem;">세 문장으로 남기는 <span style="color: var(--accent);">오늘의 결론</span>.</h2>

  <div class="flex-col gap-4" style="flex: 1; margin-top: var(--space-6); justify-content: center;">
    <div class="flex-row gap-4 items-start" style="padding: var(--space-5) var(--space-6); background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius);">
      <span class="number-badge" style="width: 36px; height: 36px; font-size: 1rem;">01</span>
      <div class="flex-col gap-1">
        <h3 style="font-size: 1.5rem; font-weight: 700; line-height: 1.35;">AI의 성과는 도구가 아니라 <span style="color: var(--accent);">루프</span>에서 나옵니다.</h3>
        <p class="caption">관찰 → 구조화 → 위임 — 세 개의 의식적 루프.</p>
      </div>
    </div>
    <div class="flex-row gap-4 items-start" style="padding: var(--space-5) var(--space-6); background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius);">
      <span class="number-badge" style="width: 36px; height: 36px; font-size: 1rem;">02</span>
      <div class="flex-col gap-1">
        <h3 style="font-size: 1.5rem; font-weight: 700; line-height: 1.35;">좋은 프롬프트는 <span style="color: var(--accent);">팀 자산</span>입니다.</h3>
        <p class="caption">개인의 기술이 아니라 문서화 가능한 프로세스로 만들기.</p>
      </div>
    </div>
    <div class="flex-row gap-4 items-start" style="padding: var(--space-5) var(--space-6); background: var(--accent-soft); border: 1px solid var(--accent); border-radius: var(--card-radius);">
      <span class="number-badge" style="width: 36px; height: 36px; font-size: 1rem;">03</span>
      <div class="flex-col gap-1">
        <h3 style="font-size: 1.5rem; font-weight: 700; line-height: 1.35; color: var(--accent-ink);">가장 큰 투자는 <span style="background: var(--accent); color:#fff; padding: 0 8px; border-radius: 4px;">메타 인식</span>입니다.</h3>
        <p class="caption" style="color: var(--accent-ink);">도구를 쓰는 나를 관찰하는 습관 — 이게 복리로 작동합니다.</p>
      </div>
    </div>
  </div>

  <p class="gm">"Prompt를 잘 쓰는 법"이 아닌, <b>Prompt를 쓰는 나</b>를 설계하는 법.</p>
</section>
</body>
</html>
