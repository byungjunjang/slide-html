<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Image Showcase 1up — Jangpm</title>
<link rel="stylesheet" href="../design-system/slides/_slide.css">
<link rel="stylesheet" href="../_pptx-slide.css">
<style>
  /* Override _slide.css 100vh body: html2pptx needs body == canvas (1280x720px = 960x540pt) */
  html, body { width: 1280px; height: 720px; padding: 0; margin: 0; min-height: 0; overflow: hidden; display: block; background: {{TOKEN:colors.bg}}; }
</style>
<style>
  /* Head pattern matches exercise slide */
  .im-head { display: flex; align-items: center; gap: var(--space-4); }
  .im-index {
    display: inline-flex; align-items: center; justify-content: center;
    width: 8px; align-self: stretch; background: var(--accent); border-radius: 3px;
  }
  .im-title {
    font-size: 2rem; font-weight: 800; color: var(--text);
    letter-spacing: -0.02em; line-height: 1.2;
  }
  .im-title .num { color: var(--accent); }

  .im-subtitle {
    display: flex; align-items: center; gap: var(--space-3);
    font-size: 1.05rem; font-weight: 600; color: var(--text);
    margin-top: var(--space-2);
  }
  .im-subtitle::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }

  /* Image frame */
  .im-frame {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    margin-top: var(--space-4);
  }
  /* Phase 3 (2026-04-27): Dropped linear-gradient + repeating-linear-gradient
     graph-paper texture per E3/E4 constraint. Solid bg + dashed border still
     visually communicates "image goes here". */
  .im-placeholder {
    width: 100%; height: 100%;
    background: var(--surface-alt);
    border: 2px dashed var(--border);
    border-radius: var(--card-radius);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-secondary);
    gap: var(--space-3);
  }
  .im-ph-icon {
    width: 56px; height: 56px; border-radius: 12px;
    background: var(--accent-soft); color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1.6rem; font-weight: 700;
  }
  .im-ph-caption { font-size: 0.95rem; font-weight: 600; }
  .im-ph-note { font-size: var(--fs-caption); color: var(--text-secondary); }
</style>
</head>
<body>
<section class="slide">
  <div class="flex-row justify-between items-center">
    <span class="label-caption">Section 02 · 사례</span>
    <span class="caption">09 / 12</span>
  </div>

  <div class="im-head">
    <div class="im-index"></div>
    <h3 class="im-title"><span class="num">(1)</span> 메타 프롬프트 : 역으로 질문하게 하기</h3>
  </div>
  <p class="im-subtitle">인터뷰 방식으로 구체적인 맥락을 제공하기</p>

  <div class="im-frame">
    <div class="im-placeholder">
      <span class="im-ph-icon">▦</span>
      <p class="im-ph-caption">스크린샷 / 예시 이미지 영역</p>
      <p class="im-ph-note">1280 × 480 권장 — 실제 이미지를 삽입해 주세요.</p>
    </div>
  </div>

  <p class="gm">"처음부터 생각을 정리하려 하지 말고, <b>핵심 질문에 잘 대답</b>부터 하자."</p>
</section>
</body>
</html>
