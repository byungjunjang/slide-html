<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Exercise Slide 1up — Jangpm</title>
<link rel="stylesheet" href="../design-system/slides/_slide.css">
<link rel="stylesheet" href="../_pptx-slide.css">
<style>
  /* Override _slide.css 100vh body: html2pptx needs body == canvas (1280x720px = 960x540pt) */
  html, body { width: 1280px; height: 720px; padding: 0; margin: 0; min-height: 0; overflow: hidden; display: block; background: {{TOKEN:colors.bg}}; }
</style>
<style>
  /* Head pattern — purple pill + big black subject */
  .ex-head { display: flex; align-items: center; gap: var(--space-5); }
  .ex-category {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 14px 28px;
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius-sm);
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .ex-subject {
    font-size: 2.1rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  /* Side-bar label */
  .ex-label {
    position: relative;
    padding-left: var(--space-4);
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: var(--space-3);
  }
  .ex-label::before {
    content: '';
    position: absolute;
    left: 0; top: 2px; bottom: 2px;
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
  }
  .ex-problem {
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.45;
    letter-spacing: -0.01em;
  }
  .ex-problem b { color: var(--accent); font-weight: 700; }

  /* Single screenshot slot */
  .ex-single {
    display: flex; flex-direction: column; gap: var(--space-2);
    flex: 1; min-height: 0;
  }
  .ex-slot-label {
    display: inline-flex; align-items: center;
    font-size: var(--fs-caption); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--accent);
    width: fit-content;
  }
  /* Phase 3 (2026-04-27): Dropped linear-gradient + repeating-linear-gradient
     graph-paper texture per E3/E4 constraint. Solid bg + dashed border still
     visually communicates "image goes here". */
  .ex-placeholder {
    flex: 1;
    background: var(--surface-alt);
    border: 2px dashed var(--border);
    border-radius: var(--card-radius);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: var(--space-2);
    color: var(--text-secondary);
    min-height: 0;
  }
  .ex-ph-icon {
    width: 56px; height: 56px; border-radius: 12px;
    background: var(--accent-soft); color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1.6rem; font-weight: 700;
  }
  .ex-ph-caption { font-size: 0.95rem; font-weight: 600; }
  .ex-ph-note { font-size: var(--fs-caption); color: var(--text-secondary); }
</style>
</head>
<body>
<section class="slide">
  <div class="flex-row justify-between items-center">
    <span class="label-caption">Section 03 · 실습</span>
    <span class="caption">08 / 12</span>
  </div>

  <!-- Head: pill + subject -->
  <div class="ex-head">
    <span class="ex-category">에이전트 실습</span>
    <span class="ex-subject">민감 정보 탐지 및 마스킹</span>
  </div>

  <!-- content group: fills between head and GM -->
  <div style="flex: 1; display: flex; flex-direction: column; gap: var(--space-5); min-height: 0;">
    <!-- Problem statement -->
    <div>
      <p class="ex-label">해결하고자 하는 문제</p>
      <p class="ex-problem">내부 문서에 있는 고객의 <b>개인 정보</b>를 알아서 탐지해서, <b>알아서 마스킹</b> 처리해줬으면 좋겠다.</p>
    </div>

    <!-- Single screenshot slot -->
    <div class="ex-single">
      <span class="ex-slot-label">예시 · Example</span>
      <div class="ex-placeholder">
        <span class="ex-ph-icon">▦</span>
        <p class="ex-ph-caption">과제 스크린샷</p>
        <p class="ex-ph-note">이 위치에 스크린샷을 삽입하세요 · 권장 1040 × 320</p>
      </div>
    </div>
  </div>

  <p class="gm">에이전트는 <b>문서의 의미 단위</b>를 먼저 파악한 뒤, <b>민감 필드만 선택적으로</b> 가립니다.</p>
</section>
</body>
</html>
