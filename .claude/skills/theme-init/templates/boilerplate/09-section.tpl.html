<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Section Divider — Jangpm</title>
<link rel="stylesheet" href="../design-system/slides/_slide.css">
<link rel="stylesheet" href="../_pptx-slide.css">
<style>
  /* Override _slide.css 100vh body: html2pptx needs body == canvas (1280x720px = 960x540pt) */
  html, body { width: 1280px; height: 720px; padding: 0; margin: 0; min-height: 0; overflow: hidden; display: block; background: {{TOKEN:colors.bg}}; }
</style>
</head>
<body>
<section class="slide slide-centered">
  <div class="flex-col gap-4" style="align-items: flex-start; padding: 0 var(--space-8);">
    <span style="display:inline-flex; padding: var(--space-2) var(--space-4); background: var(--accent); color: #fff; border-radius: var(--radius-pill); font-size: var(--fs-caption); font-weight: 600; letter-spacing: 0.05em;">
      SECTION 02 · 핵심 프레임
    </span>
    <h2 style="font-size: 5rem; font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; color: var(--text); max-width: 980px;">
      도구 위에서<br>
      <span style="color: var(--accent);">도구</span>를 바라보기
    </h2>
    <hr class="rule-accent" style="width: 80px; margin-top: var(--space-2);">
    <p style="font-size: 1.25rem; color: var(--text-secondary); max-width: 720px; line-height: 1.5;">
      AI를 '잘 쓰는 법' 이전에 — AI를 쓰는 <b style="color: var(--text);">내 사고의 루프</b>부터 점검합니다.
    </p>
  </div>
  <div style="position:absolute; bottom: var(--space-8); left: var(--space-14); right: var(--space-14); display:flex; justify-content: space-between; align-items: center; color: var(--text-secondary);">
    <span class="caption" style="color: inherit; font-family: var(--font-mono);">JANGPM × AI</span>
    <span class="caption" style="color: inherit;">03 / 12</span>
  </div>
</section>
</body>
</html>
